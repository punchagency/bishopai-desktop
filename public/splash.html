<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src 'self' data:; style-src 'unsafe-inline';"
    />
    <title>Innerlume</title>
    <style>
      /* Brand rust — identical to the logo's own background (#7f3110) so the
         square logo image melts into the window with no visible edge. */
      :root {
        --rust: #7f3110;
        --rust-deep: #6a280c;
        --cream: #f2e4d8;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        cursor: default;
      }
      .stage {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        border-radius: 22px;
        /* Soft radial vignette in the brand rust. */
        background:
          radial-gradient(120% 120% at 50% 38%, var(--rust) 0%, var(--rust-deep) 100%);
        box-shadow: inset 0 0 0 1px rgba(242, 228, 216, 0.06);
        -webkit-app-region: drag; /* let Nicole move the frameless splash */
      }

      /* Breathing glow behind the mark. */
      .halo {
        position: absolute;
        top: 40%;
        left: 50%;
        width: 340px;
        height: 340px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(242, 228, 216, 0.16) 0%, rgba(242, 228, 216, 0) 62%);
        opacity: 0;
        animation: halo-in 1s ease 0.15s forwards, breathe 4.5s ease-in-out 1.1s infinite;
        pointer-events: none;
      }

      .logo {
        width: 250px;
        height: 250px;
        object-fit: contain;
        opacity: 0;
        transform: scale(0.9) translateY(6px);
        animation:
          logo-in 1.1s cubic-bezier(0.22, 0.61, 0.36, 1) 0.1s forwards,
          float 5s ease-in-out 1.2s infinite;
        /* Soft cream aura — "inner light" — rather than a dark shadow. */
        filter: drop-shadow(0 0 16px rgba(242, 228, 216, 0.28));
      }

      /* Indeterminate loading sweep. */
      .bar {
        position: relative;
        width: 148px;
        height: 3px;
        border-radius: 999px;
        background: rgba(242, 228, 216, 0.16);
        overflow: hidden;
        opacity: 0;
        animation: fade-in 0.6s ease 0.9s forwards;
      }
      .bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(242, 228, 216, 0) 0%, var(--cream) 50%, rgba(242, 228, 216, 0) 100%);
        animation: sweep 1.5s ease-in-out 1.1s infinite;
      }

      @keyframes logo-in {
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      @keyframes halo-in {
        to {
          opacity: 1;
        }
      }
      @keyframes fade-in {
        to {
          opacity: 1;
        }
      }
      @keyframes breathe {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 0.85;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.12);
          opacity: 1;
        }
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-5px) scale(1.012);
        }
      }
      @keyframes sweep {
        0% {
          left: -40%;
        }
        100% {
          left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="halo"></div>
      <img class="logo" src="./logo-mark.png" alt="Innerlume" />
      <div class="bar" role="progressbar" aria-label="Loading Innerlume"></div>
    </div>
  </body>
</html>
